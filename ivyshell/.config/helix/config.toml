theme = "dynamic"

[editor]
line-number = "absolute"
cursorline = true
cursorcolumn = false
color-modes = true
rulers = [100]
bufferline = "multiple"
auto-save = true
idle-timeout = 400
completion-trigger-len = 1
auto-completion = true
auto-info = true
mouse = true
middle-click-paste = false
shell = ["fish", "-c"]
indent-heuristic = "hybrid"

[editor.whitespace.render]
space = "none"
tab = "all"
newline = "none"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false
git-ignore = true

[editor.indent-guides]
render = true
character = "╎"

[editor.statusline]
left = ["mode", "spinner", "file-name", "file-modification-indicator"]
center = []
right = ["diagnostics", "position", "file-encoding", "file-type"]
separator = "│"

[editor.lsp]
display-messages = true
display-inlay-hints = true

[editor.auto-pairs]
"(" = ")"
"{" = "}"
"[" = "]"
'"' = '"'

[keys.normal]
C-s = ":w"
C-z = "undo"
"+" = "indent"
"-" = "unindent"
G = "goto_last_line"
"^" = "goto_line_start"
"$" = "goto_line_end"

[keys.insert]
C-s = ["normal_mode", ":w"]
C-z = "undo"

[keys.select]
C-s = ":w"
