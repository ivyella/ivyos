[manager]
keymap = [
  { on = "q", run = "quit", desc = "Quit" },
  { on = "<Esc>", run = "escape", desc = "Escape" },

  # Navigation
  { on = "k", run = "arrow -1", desc = "Up" },
  { on = "j", run = "arrow 1", desc = "Down" },
  { on = "h", run = "leave", desc = "Go to parent" },
  { on = "l", run = "enter", desc = "Enter directory / open file" },
  { on = "g", run = "arrow -99999999", desc = "Top" },
  { on = "G", run = "arrow 99999999", desc = "Bottom" },
  { on = "<C-u>", run = "arrow -50%", desc = "Scroll up" },
  { on = "<C-d>", run = "arrow 50%", desc = "Scroll down" },

  # Actions
  { on = "<Enter>", run = "open", desc = "Open" },
  { on = "e", run = "open --interactive", desc = "Open interactively" },
  { on = "r", run = "rename --cursor=before_ext", desc = "Rename" },
  { on = "d", run = "remove --permanently", desc = "Delete permanently" },
  { on = "D", run = "remove", desc = "Trash" },
  { on = "a", run = "create", desc = "Create file/dir" },
  { on = "y", run = "yank", desc = "Yank (copy)" },
  { on = "x", run = "yank --cut", desc = "Yank (cut)" },
  { on = "p", run = "paste", desc = "Paste" },
  { on = "P", run = "paste --force", desc = "Paste (overwrite)" },

  # Copy path
  { on = "c", run = "copy path", desc = "Copy path" },
  { on = "C", run = "copy filename", desc = "Copy filename" },

  # Archive extraction
  { on = "X", run = "shell 'aunpack \"$1\"' --confirm", desc = "Extract archive" },

  # Selection
  { on = "<Space>", run = "select --state=none", desc = "Toggle select" },
  { on = "v", run = "visual_mode", desc = "Visual mode" },
  { on = "V", run = "select_all --state=true", desc = "Select all" },

  # Search
  { on = "f", run = "find --smart", desc = "Find" },
  { on = "F", run = "search fd", desc = "Search (fd)" },
  { on = "/", run = "find --smart", desc = "Find" },

  # Tabs
  { on = "t", run = "tab_create --current", desc = "New tab" },
  { on = "[", run = "tab_switch -1 --relative", desc = "Prev tab" },
  { on = "]", run = "tab_switch 1 --relative", desc = "Next tab" },

  # Toggle hidden
  { on = ".", run = "hidden toggle", desc = "Toggle hidden files" },
]
