"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$directory\
$git_branch\
$time\
$line_break$character"""


[palettes.ivytheme]
color_fg0    = '{{fg0}}'
color_fg1    = '{{fg1}}'
color_fg2    = '{{fg2}}'
color_bg0    = '{{bg0}}'
color_bg1    = '{{bg1}}'
color_bg2    = '{{bg2}}'
color_bg3    = '{{bg3}}'
color_bg4    = '{{bg4}}'
color_accent = '{{accent0}}'
color_accent1= '{{accent1}}'
color_red    = '{{red0}}'
color_green  = '{{green0}}'
color_yellow = '{{yellow0}}'
color_blue   = '{{blue0}}'
color_cyan   = '{{cyan0}}'

[username]
show_always = true
style_user = "bg:color_bg3 fg:color_fg0"
style_root = "bg:color_bg3 fg:color_fg0"
format = '[{  $user ]($style)'

[directory]
style = "fg:color_fg0 bg:color_bg2"
format = "[| $path |]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style = "bg:color_aqua"
format = '[[ $symbol $branch |](fg:color_fg0 bg:color_bg1)]($style)'

[time]
disabled = false
time_format = "%I:%M %p"
style = "bg:color_bg1"
format = '[[ $time }](fg:color_fg0 bg:color_bg1)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[ ➜](bold fg:color_accent)'
error_symbol = '[ ➜](bold fg:color_red)'
